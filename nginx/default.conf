upstream tusd {
    server tusd:8080;
}

upstream bot-manager {
    server bot-manager:8080;
}

server {
    server_name telegram_userbot_nginx;
    error_log /dev/stderr warn;
    access_log /dev/stdout combined buffer=32k flush=1s;
    root /telegram-userbot/backend/public;
    index index.php;
    client_max_body_size 0;

    # tusd uploads (resumable)
    location /tus/ {
        proxy_pass http://tusd;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 0;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # Proxy for the websocket (CORS prevention)
    location /ws/ {
        proxy_pass http://bot-manager;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $http_connection;
        proxy_set_header Host $host;

        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Headers *;

        proxy_cache_bypass $http_upgrade;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # When the file does not exist, always pass the request to the PHP-FPM
    location / {
        try_files $uri @php;
        gzip_static on;
    }

    # PHP front controller (Symfony): fastCGI fallback (index.php)
    location @php {
        if ($http_x_force_timeout = "true") {
            return 504;
        }

        fastcgi_pass backend:9000;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /telegram-userbot/backend/public/index.php;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_param QUERY_STRING $query_string;

        # Timeouts
        fastcgi_connect_timeout 10s;
        fastcgi_send_timeout 30s;
        fastcgi_read_timeout 30s;
    }
}
