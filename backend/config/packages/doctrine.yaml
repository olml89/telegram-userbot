doctrine:

  dbal:
    driver: pdo_pgsql
    host: 'postgres'
    port: '5432'
    dbname: '%env(DB_NAME)%'
    user: '%env(DB_USER)%'
    password: '%env(DB_PASSWORD)%'
    server_version: '17' # PostgreSQL version in postgres container

  orm:
    entity_managers:
      default:
        auto_mapping: false
        naming_strategy: doctrine.orm.naming_strategy.underscore_number_aware
