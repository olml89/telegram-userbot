services:

  # Register ExceptionSentryReporterSubscriber
  olml89\TelegramUserbot\Backend\Shared\Infrastructure\Symfony\EventSubscribers\ExceptionSentryReporterSubscriber:
    autowire: true
    autoconfigure: true
    arguments:
      $exceptionSentryReporter: '@olml89\TelegramUserbot\Backend\Shared\Infrastructure\Symfony\Exception\ExceptionSentryReporter'

  # CaughtExceptionHandler: logs to the errors channel, reports to Sentry
  olml89\TelegramUserbot\Backend\Shared\Domain\Exception\Handler\CaughtExceptionHandler:
    arguments:
      $exceptionHandlers:
        - '@olml89\TelegramUserbot\Backend\Shared\Infrastructure\Symfony\Exception\ExceptionLogger'
        - '@olml89\TelegramUserbot\Backend\Shared\Infrastructure\Symfony\Exception\ExceptionSentryReporter'
