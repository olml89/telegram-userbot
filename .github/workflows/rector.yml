name: Rector

# PUSH TO MAIN
# 1) GHCR runs (if dev/Dockerfile changed)
# 2) Rector waits for GHCR to complete successfully
# 3) Deploy waits for Rectpr (and PHPStan, PHPUnit, Pint) to complete
#
# PULL REQUEST
# 1) Rector runs immediately (uses already published Docker image)

on:
  workflow_run:
    workflows:
      - GHCR
    types:
      - completed
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  rector:
    runs-on: ubuntu-latest
    # Only execute if GHCR was successful, or if it is a PR where GHCR doesn't run
    if: >
      github.event_name == 'pull_request' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Login to GHCR
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Run automated refactoring (rector) in the dev container
        run: |
          docker run --rm \
            -e APP_ENV=ci \
            -w /telegram-userbot/dev \
            ghcr.io/olml89/telegram-userbot-dev:ci \
            ./rector/rector.sh --dry-run
