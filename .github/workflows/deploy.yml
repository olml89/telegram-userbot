name: Deploy

# Waits for the CI workflow to complete successfully before deploying

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main
  workflow_dispatch:  # Allows manual deployment

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push'
      )
    environment: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Add server to known hosts
        run: |
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Generate .env files from .env.example templates
        run: |
          # Stop script if any variable is missing instead of failing silently
          set -euo pipefail
          
          # Export .env variables
          export APP_ENV="${{ vars.APP_ENV }}"
          export BACKEND_PORT="${{ vars.BACKEND_PORT }}"
          export SUPERVISOR_USER="${{ secrets.SUPERVISOR_USER }}"
          export SUPERVISOR_PASSWORD="${{ secrets.SUPERVISOR_PASSWORD }}"
          export GRAFANA_PORT="${{ vars.GRAFANA_PORT }}"
          export GRAFANA_SECURITY_ADMIN_PASSWORD="${{ secrets.GRAFANA_SECURITY_ADMIN_PASSWORD }}"
          
          # Export backend/.env variables
          export APP_DEBUG="${{ vars.APP_DEBUG }}"
          export APP_SECRET="${{ secrets.APP_SECRET }}"
          export BACKEND_SENTRY_DSN="${{ secrets.BACKEND_SENTRY_DSN }}"
          export DB_HOST="${{ secrets.DB_HOST }}"
          export DB_PORT="${{ vars.DB_PORT }}"
          export DB_NAME="${{ secrets.DB_NAME }}"
          export DB_USER="${{ secrets.DB_USER }}"
          export DB_PASSWORD="${{ secrets.DB_PASSWORD }}"
          export APP_LIBRARY_CONTENT_PER_PAGE="${{ vars.APP_LIBRARY_CONTENT_PER_PAGE }}"
          
          # Export bot/.env variables
          export BOT_SENTRY_DSN="${{ secrets.BOT_SENTRY_DSN }}"
          export TELEGRAM_API_ID="${{ secrets.TELEGRAM_API_ID }}"
          export TELEGRAM_API_HASH="${{ secrets.TELEGRAM_API_HASH }}"
          export TELEGRAM_PHONE_NUMBER="${{ secrets.TELEGRAM_PHONE_NUMBER }}"
          export TELEGRAM_USERNAME="${{ secrets.TELEGRAM_USERNAME }}"
          
          # Export bot-manager/.env variables
          export BOT_MANAGER_SENTRY_DSN="${{ secrets.BOT_SENTRY_DSN }}"
          
          # Interpolate environment variables on docker-compose files
          envsubst < docker-compose.yml > docker-compose.generated.yml
          envsubst < docker-compose.prod.yml > docker-compose.prod.generated.yml

      - name: Deploy to server
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'ENDSSH'
            set -euo pipefail
          
            # Pull last changes from main
            cd /home/tbot/telegram-userbot
            git fetch --all
            git reset --hard origin/main
          ENDSSH
          
          # Upload generated compose files AFTER git reset
          scp -i ~/.ssh/deploy_key -P ${{ secrets.SSH_PORT }} docker-compose.generated.yml ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/home/tbot/telegram-userbot/docker-compose.yml
          scp -i ~/.ssh/deploy_key -P ${{ secrets.SSH_PORT }} docker-compose.prod.generated.yml ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/home/tbot/telegram-userbot/docker-compose.prod.yml

          ssh -i ~/.ssh/deploy_key -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'ENDSSH'
            set -euo pipefail

            # Set docker-compose files permissions and run deploy script
            cd /home/tbot/telegram-userbot
            chmod 600 docker-compose.yml docker-compose.prod.yml

            make deploy
          ENDSSH
