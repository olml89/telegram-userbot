name: CI

# Runs all quality checks in parallel

on:
  # push is disabled as main is a locked branch
  pull_request:
    branches:
      - main

jobs:
  # Builds the dev/Dockerfile image if any of the dev/* files changed
  build-image:
    runs-on: ubuntu-latest

    permissions:
      packages: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.5

      - name: Check if the repository is in a consistent state
        working-directory: ./dev
        run: ./bin/git/commit/check-repository/check-repository.sh

      - name: Check if dev image files changed
        working-directory: ./dev
        id: check
        run: |
          BEFORE_SHA="${{ github.event.before }}"
          
          if [ -z "$BEFORE_SHA" ] && [ "${{ github.event_name }}" = "pull_request" ]; then
            BEFORE_SHA="${{ github.event.pull_request.base.sha }}"
          fi
          
          ./bin/ci/check-dev-image-changes.sh \
            "${{ github.event_name }}" \
            "$BEFORE_SHA" \
            "${{ github.sha }}" \
            "$GITHUB_OUTPUT"

      - name: Login to GHCR
        if: steps.check.outputs.rebuild == 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push dev/Dockerfile image
        if: steps.check.outputs.rebuild == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./dev/Dockerfile
          target: ci
          push: true
          tags: ghcr.io/olml89/telegram-userbot-dev:ci

  phpstan:
    needs: build-image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Run PHPStan
        run: |
          docker run --rm \
            -e APP_ENV=ci \
            -w /telegram-userbot/dev \
            ghcr.io/olml89/telegram-userbot-dev:ci \
            ./bin/phpstan/phpstan.sh --no-progress

  phpunit:
    needs: build-image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Run PHPUnit
        run: |
          docker run --rm \
            -e APP_ENV=ci \
            -w /telegram-userbot/dev \
            ghcr.io/olml89/telegram-userbot-dev:ci \
            ./bin/phpunit/phpunit.sh --coverage-clover

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  pint:
    needs: build-image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Run Pint
        run: |
          docker run --rm \
            -e APP_ENV=ci \
            -w /telegram-userbot/dev \
            ghcr.io/olml89/telegram-userbot-dev:ci \
            ./bin/pint/pint.sh --test

  rector:
    needs: build-image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Run Rector
        run: |
          docker run --rm \
            -e APP_ENV=ci \
            -w /telegram-userbot/dev \
            ghcr.io/olml89/telegram-userbot-dev:ci \
            ./bin/rector/rector.sh --dry-run

  tsc:
    needs: build-image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Run Typescript compiler
        run: |
          docker run --rm \
            -e APP_ENV=ci \
            -w /telegram-userbot/dev \
            ghcr.io/olml89/telegram-userbot-dev:ci \
            ./bin/tsc/tsc.sh --noEmit

  summary:
    runs-on: ubuntu-latest
    needs:
      - phpstan
      - phpunit
      - pint
      - rector
      - tsc
    if: always()
    steps:
      - name: Generate summary
        run: |
          echo "## Quality Checks Summary 📊" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| PHPStan | ${{ needs.phpstan.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| PHPUnit | ${{ needs.phpunit.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Pint | ${{ needs.pint.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Rector | ${{ needs.rector.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Typescript compiler | ${{ needs.tsc.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
