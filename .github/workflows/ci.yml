name: CI

# Runs all quality checks in parallel

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # Builds the dev/Dockerfile image if any of the image-affecting files changed
  build-image:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Check if image-affecting files changed
        id: check
        run: dev/bin/deploy/check-image-changes.sh "${{ github.event_name }}" "${{ github.event.before }}" "${{ github.sha }}" "$GITHUB_OUTPUT"

      - name: Validate dev/Dockerfile and dev/composer.json consistency
        if: steps.check.outputs.rebuild == 'true'
        run: dev/bin/deploy/validate-image-consistency.php

      - name: Login to GHCR
        if: steps.check.outputs.rebuild == 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push dev/Dockerfile image
        if: steps.check.outputs.rebuild == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./dev/Dockerfile
          target: ci
          push: true
          tags: ghcr.io/olml89/telegram-userbot-dev:ci

  phpstan:
    needs: build-image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Login to GHCR
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Run PHPStan
        run: |
          docker run --rm \
            -e APP_ENV=ci \
            -w /telegram-userbot/dev \
            ghcr.io/olml89/telegram-userbot-dev:ci \
            ./phpstan/phpstan.sh --ci

  phpunit:
    needs: build-image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Login to GHCR
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Run PHPUnit
        run: |
          docker run --rm \
            -e APP_ENV=ci \
            -w /telegram-userbot/dev \
            ghcr.io/olml89/telegram-userbot-dev:ci \
            ./phpunit/phpunit.sh --ci

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  pint:
    needs: build-image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Login to GHCR
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Run Pint
        run: |
          docker run --rm \
            -e APP_ENV=ci \
            -w /telegram-userbot/dev \
            ghcr.io/olml89/telegram-userbot-dev:ci \
            ./pint/pint.sh --test

  rector:
    needs: build-image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Login to GHCR
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Run Rector
        run: |
          docker run --rm \
            -e APP_ENV=ci \
            -w /telegram-userbot/dev \
            ghcr.io/olml89/telegram-userbot-dev:ci \
            ./rector/rector.sh --dry-run

  summary:
    runs-on: ubuntu-latest
    needs:
      - phpstan
      - phpunit
      - pint
      - rector
    if: always()
    steps:
      - name: Generate summary
        run: |
          echo "## Quality Checks Summary 📊" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| PHPStan | ${{ needs.phpstan.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| PHPUnit | ${{ needs.phpunit.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Pint | ${{ needs.pint.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Rector | ${{ needs.rector.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
