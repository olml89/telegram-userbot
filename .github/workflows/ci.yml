name: CI

# Runs all quality checks in parallel

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # Builds the dev/Dockerfile image if any of the image-affecting files changed
  build-image:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if image-affecting files changed
        id: check
        run: |
          set -euo pipefail

          IMAGE_PATHS="dev/Dockerfile dev/composer.json docker-php-ext-opcache.ini"

          REBUILD=false

          # On pull requests, compare against the base branch
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD)
          else
            CHANGED_FILES=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }})
          fi

          for path in $IMAGE_PATHS; do
            if echo "$CHANGED_FILES" | grep -q "^${path}$"; then
              echo "🔄 Changed: $path"
              REBUILD=true
            fi
          done

          echo "rebuild=$REBUILD" >> $GITHUB_OUTPUT

      - name: Validate dev/Dockerfile and dev/composer.json consistency
        if: steps.check.outputs.rebuild == 'true'
        run: |
          set -euo pipefail

          echo "🔍 Checking that dev/Dockerfile extensions match dev/composer.json..."

          # Extract ext-* from dev/composer.json (sorted)
          COMPOSER_EXTS=$(php -r "
            \$json = json_decode(file_get_contents('dev/composer.json'), true);
            \$exts = [];
            foreach (\$json['require'] ?? [] as \$pkg => \$ver) {
              if (str_starts_with(\$pkg, 'ext-')) {
                \$exts[] = substr(\$pkg, 4);
              }
            }
            sort(\$exts);
            echo implode(\"\n\", \$exts);
          ")

          # Extract extensions installed in dev/Dockerfile (sorted)
          DOCKERFILE_EXTS=$(grep 'install-php-extensions' dev/Dockerfile \
            | sed 's/#.*//' \
            | grep -oE '[a-z_]+' \
            | grep -v -E '^(install|php|extensions|xdebug|composer|RUN)$' \
            | sort -u)

          echo "Composer extensions: $COMPOSER_EXTS"
          echo "Dockerfile extensions: $DOCKERFILE_EXTS"

          if [ "$COMPOSER_EXTS" != "$DOCKERFILE_EXTS" ]; then
            echo "❌ Mismatch between dev/Dockerfile and dev/composer.json!"
            echo ""
            echo "In composer.json but not in Dockerfile:"
            comm -23 <(echo "$COMPOSER_EXTS") <(echo "$DOCKERFILE_EXTS") || true
            echo ""
            echo "In Dockerfile but not in composer.json:"
            comm -13 <(echo "$COMPOSER_EXTS") <(echo "$DOCKERFILE_EXTS") || true
            exit 1
          fi

          echo "✅ Dockerfile and composer.json extensions are in sync."

      - name: Login to GHCR
        if: steps.check.outputs.rebuild == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push dev/Dockerfile image
        if: steps.check.outputs.rebuild == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./dev/Dockerfile
          target: ci
          push: true
          tags: ghcr.io/olml89/telegram-userbot-dev:ci

  phpstan:
    needs: build-image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Run PHPStan
        run: |
          docker run --rm \
            -e APP_ENV=ci \
            -w /telegram-userbot/dev \
            ghcr.io/olml89/telegram-userbot-dev:ci \
            ./phpstan/phpstan.sh --ci

  phpunit:
    needs: build-image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Run PHPUnit
        run: |
          docker run --rm \
            -e APP_ENV=ci \
            -w /telegram-userbot/dev \
            ghcr.io/olml89/telegram-userbot-dev:ci \
            ./phpunit/phpunit.sh --ci

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  pint:
    needs: build-image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Run Pint
        run: |
          docker run --rm \
            -e APP_ENV=ci \
            -w /telegram-userbot/dev \
            ghcr.io/olml89/telegram-userbot-dev:ci \
            ./pint/pint.sh --test

  rector:
    needs: build-image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Run Rector
        run: |
          docker run --rm \
            -e APP_ENV=ci \
            -w /telegram-userbot/dev \
            ghcr.io/olml89/telegram-userbot-dev:ci \
            ./rector/rector.sh --dry-run

  summary:
    runs-on: ubuntu-latest
    needs:
      - phpstan
      - phpunit
      - pint
      - rector
    if: always()
    steps:
      - name: Generate summary
        run: |
          echo "## Quality Checks Summary 📊" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| PHPStan | ${{ needs.phpstan.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| PHPUnit | ${{ needs.phpunit.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Pint | ${{ needs.pint.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Rector | ${{ needs.rector.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
