name: CI

# Runs all quality checks in parallel after GHCR completes

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # Wait for GHCR if it's running
  wait-for-ghcr:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for GHCR to complete
        uses: lewagon/wait-on-check-action@v1.3.4
        with:
          ref: ${{ github.sha }}
          check-name: 'build-and-push'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 10
          allowed-conclusions: success,skipped

  phpstan:
    needs: wait-for-ghcr
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Login to GHCR
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Run PHPStan
        run: |
          docker run --rm \
            -e APP_ENV=ci \
            -w /telegram-userbot/dev \
            ghcr.io/olml89/telegram-userbot-dev:ci \
            ./phpstan/phpstan.sh --ci

  phpunit:
    needs: wait-for-ghcr
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Login to GHCR
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Run PHPUnit
        run: |
          docker run --rm \
            -e APP_ENV=ci \
            -w /telegram-userbot/dev \
            ghcr.io/olml89/telegram-userbot-dev:ci \
            ./phpunit/phpunit.sh --ci

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  pint:
    needs: wait-for-ghcr
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Login to GHCR
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Run Pint
        run: |
          docker run --rm \
            -e APP_ENV=ci \
            -w /telegram-userbot/dev \
            ghcr.io/olml89/telegram-userbot-dev:ci \
            ./pint/pint.sh --test

  rector:
    needs: wait-for-ghcr
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Login to GHCR
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Run Rector
        run: |
          docker run --rm \
            -e APP_ENV=ci \
            -w /telegram-userbot/dev \
            ghcr.io/olml89/telegram-userbot-dev:ci \
            ./rector/rector.sh --dry-run

  summary:
    runs-on: ubuntu-latest
    needs:
      - phpstan
      - phpunit
      - pint
      - rector
    if: always()
    steps:
      - name: Generate summary
        run: |
          echo "## Quality Checks Summary 📊" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| PHPStan | ${{ job.phpstan.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| PHPUnit | ${{ job.phpunit.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Pint | ${{ job.pint.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Rector | ${{ job.rector.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
