name: Pint

# PUSH TO MAIN
# GHCR -> PHPStan, PHPUnit, Pint, Rector -> Deploy
#
# PULL REQUEST
# (Don't wait for GHCR, the image already published is used)
# PHPStan, PHPUnit, Pint, Rector -> Deploy

on:
  workflow_run:
    workflows:
      - GHCR
    types:
      - completed
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  pint:
    runs-on: ubuntu-latest
    # Only execute if GHCR was successful, or if it is a PR where GHCR doesn't run
    if: >
      github.event_name == 'pull_request' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Login to GHCR
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Run code linting (pint) in the dev container
        run: |
          docker run --rm \
            -e APP_ENV=ci \
            -w /telegram-userbot/dev \
            ghcr.io/olml89/telegram-userbot-dev:ci \
            ./pint/pint.sh --test
