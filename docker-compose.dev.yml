services:

  ######################################################################################################################
  # Infrastructure layer
  ######################################################################################################################

  alloy:
    build:
      context: .
      dockerfile: alloy/Dockerfile
      target: dev
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./alloy/config.alloy:/etc/alloy/config.alloy:cached

  redis:
    build:
      context: .
      dockerfile: redis/Dockerfile
      target: dev
    volumes:
      - telegram-userbot-redis:/data:cached
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:cached

  postgres:
    build:
      context: .
      dockerfile: postgres/Dockerfile
      target: dev
    ports: # Expose the database port to the outside: only during development
      - ${POSTGRES_PORT}:5432
    volumes:
      - telegram-userbot-postgres:/var/lib/postgresql/data:cached
      - ./postgres/postgresql.conf:/etc/postgresql/postgresql.conf:cached

  ######################################################################################################################
  # Application layer
  ######################################################################################################################

  bot:
    build:
      context: .
      dockerfile: bot/Dockerfile
      target: dev
      args:
        XDEBUG_PORT: ${XDEBUG_BOT_PORT}
    environment:
      PHP_IDE_CONFIG: "serverName=${PHP_SERVER_NAME}"
      COMPOSER_HOME: var/composer
    user: ${UID}:${GID}
    volumes:
      - ./application:/telegram-userbot/application:cached
      - ./bot-runtime:/telegram-userbot/bot-runtime:cached
      - ./bot:/telegram-userbot/bot:cached
      - ./bot/supervisor:/etc/supervisor:cached
      - ./dev/bin/composer/composer-install.sh:/telegram-userbot/dev/bin/composer/composer-install.sh:cached

  bot-manager:
    build:
      context: .
      dockerfile: bot-manager/Dockerfile
      target: dev
      args:
        XDEBUG_PORT: ${XDEBUG_BOT_MANAGER_PORT}
    environment:
      PHP_IDE_CONFIG: "serverName=${PHP_SERVER_NAME}"
      COMPOSER_HOME: var/composer
    user: ${UID}:${GID}
    volumes:
      - ./application:/telegram-userbot/application:cached
      - ./bot-runtime:/telegram-userbot/bot-runtime:cached
      - ./bot-manager:/telegram-userbot/bot-manager:cached
      - ./bot-manager/supervisor:/etc/supervisor:cached
      - ./dev/bin/composer/composer-install.sh:/telegram-userbot/dev/bin/composer/composer-install.sh:cached

  backend:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
      target: dev
      args:
        XDEBUG_PORT: ${XDEBUG_BACKEND_PORT}
    environment:
      PHP_IDE_CONFIG: "serverName=${PHP_SERVER_NAME}"
      COMPOSER_HOME: var/composer
    user: ${UID}:${GID}
    volumes:
      - ./application:/telegram-userbot/application:cached
      - ./backend:/telegram-userbot/backend:cached
      - ./backend/php-fpm/www.dev.conf:/usr/local/etc/php-fpm.d/www.conf:cached
      - ./dev/bin/composer/composer-install.sh:/telegram-userbot/dev/bin/composer/composer-install.sh:cached
      - ./.runtime/uploads:/telegram-userbot/backend/var/uploads:cached
      - ./.runtime/content:/telegram-userbot/backend/var/content:cached

  ######################################################################################################################
  # Gateway layer
  ######################################################################################################################

  tusd:
    build:
      context: .
      dockerfile: tusd/Dockerfile
      target: dev
    user: ${UID}:${GID}
    volumes:
      - ./.runtime/uploads:/srv/tusd-data/data:cached

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
      target: dev
    ports:
      - ${HTTP_PORT}:80
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:cached

  ######################################################################################################################
  # Monitoring layer
  ######################################################################################################################

  loki:
    build:
      context: .
      dockerfile: loki/Dockerfile
      target: dev
    volumes:
      - telegram-userbot-loki:/loki
      - ./loki/local-config.yaml:/etc/loki/local-config.yaml

  prometheus:
    build:
      context: .
      dockerfile: prometheus/Dockerfile
      target: dev
    volumes:
      - telegram-userbot-prometheus:/prometheus
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:cached

  grafana:
    build:
      context: .
      dockerfile: grafana/Dockerfile
      target: dev
    volumes:
      - ./grafana/dev:/etc/grafana/provisioning/datasources:cached

  ######################################################################################################################
  # Development layer
  ######################################################################################################################

  # Vite server for Hot Module Replacement
  vite:
    container_name: telegram_userbot_vite
    build:
      context: .
      dockerfile: vite/Dockerfile
    depends_on:
      alloy:
        condition: service_started
      backend:
        condition: service_healthy
    entrypoint: [sh, /telegram-userbot/vite/entrypoint.sh]
    environment:
      NPM_CONFIG_CACHE: var/npm
    ports:
      - ${VITE_PORT}:5173
    user: ${UID}:${GID}
    volumes:
      - ./backend:/telegram-userbot/backend:cached
      - ./vite:/telegram-userbot/vite:cached

  # dev container to run code quality tools
  dev:
    container_name: telegram_userbot_dev
    build:
      context: .
      dockerfile: dev/Dockerfile
      target: dev
      args:
        XDEBUG_PORT: ${XDEBUG_DEV_PORT}
    depends_on:
      alloy:
        condition: service_started
      backend:
        condition: service_healthy
    cpus: 12
    mem_limit: 24g
    tty: true
    entrypoint: [sh, bin/entrypoint.sh]
    environment:
      APP_ENV: ${APP_ENV}
      PHP_IDE_CONFIG: "serverName=${PHP_SERVER_NAME}"
      COMPOSER_PROCESS_TIMEOUT: 0
      NPM_CONFIG_CACHE: var/npm
      HOME: /home/${USER}
      COMPOSER_HOME: var/composer
    user: ${UID}:${GID}
    volumes:
      - /home/${USER}:/home/${USER}:cached
      - ./.git:/telegram-userbot/.git:cached
      - ./application:/telegram-userbot/application:cached
      - ./bot-runtime:/telegram-userbot/bot-runtime:cached
      - ./bot:/telegram-userbot/bot:cached
      - ./bot-manager:/telegram-userbot/bot-manager:cached
      - ./backend:/telegram-userbot/backend:cached
      - ./dev:/telegram-userbot/dev:cached
