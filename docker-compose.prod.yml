name: telegram-userbot

services:

  tusd:
    build:
      dockerfile: tusd/Dockerfile
      target: prod
    volumes:
      - telegram-userbot-uploads:/var/uploads:cached
      - telegram-userbot-logs:/var/log:cached

  nginx:
    build:
      dockerfile: nginx/Dockerfile
      target: prod
    volumes:
      - telegram-userbot-assets:/telegram-userbot/backend/public/build:ro
      - telegram-userbot-logs:/var/log:cached

  backend:
    build:
      dockerfile: backend/Dockerfile
      target: prod
    environment:
      APP_DEBUG: ${APP_DEBUG}
      APP_SECRET: ${APP_SECRET}
      BACKEND_SENTRY_DSN: ${BACKEND_SENTRY_DSN}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      APP_LIBRARY_CONTENT_PER_PAGE: ${APP_LIBRARY_CONTENT_PER_PAGE}
    volumes:
      - telegram-userbot-assets:/telegram-userbot/backend/public/build:cached
      - telegram-userbot-uploads:/var/uploads:cached
      - telegram-userbot-content:/var/content:cached
      - telegram-userbot-logs:/var/log:cached

  bot-manager:
    build:
      dockerfile: bot-manager/Dockerfile
      target: prod
    environment:
      BOT_MANAGER_SENTRY_DSN: ${BOT_MANAGER_SENTRY_DSN}
    volumes:
      - telegram-userbot-logs:/var/log:cached

  bot:
    build:
      dockerfile: bot/Dockerfile
      target: prod
    environment:
      BOT_SENTRY_DSN: ${BOT_SENTRY_DSN}
      TELEGRAM_API_ID: ${TELEGRAM_API_ID}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH}
      TELEGRAM_PHONE_NUMBER: ${TELEGRAM_PHONE_NUMBER}
      TELEGRAM_USERNAME: ${TELEGRAM_USERNAME}
    volumes:
      - telegram-userbot-logs:/var/log:cached

  redis:
    build:
      dockerfile: redis/Dockerfile
      target: prod
    volumes:
      - telegram-userbot-redis:/data:cached
      - telegram-userbot-logs:/var/log:cached

  postgres:
    build:
      dockerfile: postgres/Dockerfile
      target: prod
    volumes:
      - telegram-userbot-db:/var/lib/postgresql/data:cached
      - telegram-userbot-logs:/var/log:cached

  alloy:
    build:
      dockerfile: alloy/Dockerfile
      target: prod
    volumes:
      - telegram-userbot-logs:/var/log:cached

volumes:
  telegram-userbot-logs:
  telegram-userbot-assets:
  telegram-userbot-uploads:
  telegram-userbot-content:
