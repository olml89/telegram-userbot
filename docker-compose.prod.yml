name: telegram-userbot

x-bot-runtime-env: &bot-runtime-env
  REDIS_STATUS_CHANNEL: ${REDIS_STATUS_CHANNEL}
  REDIS_PHONE_CODE_STORAGE_KEY: ${REDIS_PHONE_CODE_STORAGE_KEY}
  SUPERVISOR_CONFIG_PATH: ${SUPERVISOR_CONFIG_PATH}

services:

  ######################################################################################################################
  # Infrastructure layer
  ######################################################################################################################

  alloy:
    build:
      context: .
      dockerfile: alloy/Dockerfile
      target: prod
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  redis:
    build:
      context: .
      dockerfile: redis/Dockerfile
      target: prod
    restart: unless-stopped
    volumes:
      - telegram-userbot-redis:/data:cached

  postgres:
    build:
      context: .
      dockerfile: postgres/Dockerfile
      target: prod
    restart: unless-stopped
    volumes:
      - telegram-userbot-postgres:/var/lib/postgresql/data:cached

  ######################################################################################################################
  # Application layer
  ######################################################################################################################

  bot:
    build:
      context: .
      dockerfile: bot/Dockerfile
      target: prod
    restart: unless-stopped
    environment:
      <<: *bot-runtime-env
      BOT_SENTRY_DSN: ${BOT_SENTRY_DSN}
      TELEGRAM_API_ID: ${TELEGRAM_API_ID}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH}
      TELEGRAM_PHONE_NUMBER: ${TELEGRAM_PHONE_NUMBER}
      TELEGRAM_USERNAME: ${TELEGRAM_USERNAME}

  bot-manager:
    build:
      context: .
      dockerfile: bot-manager/Dockerfile
      target: prod
    restart: unless-stopped
    environment:
      <<: *bot-runtime-env
      BOT_MANAGER_SENTRY_DSN: ${BOT_MANAGER_SENTRY_DSN}

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: prod
      args:
        UPLOAD_MANAGERS_GID: ${UPLOAD_MANAGERS_GID}
    restart: unless-stopped
    environment:
      APP_DEBUG: ${APP_DEBUG}
      APP_SECRET: ${APP_SECRET}
      BACKEND_SENTRY_DSN: ${BACKEND_SENTRY_DSN}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      APP_LIBRARY_CONTENT_PER_PAGE: ${APP_LIBRARY_CONTENT_PER_PAGE}
    volumes:
      - telegram-userbot-assets:/telegram-userbot/backend/public/build:cached
      - telegram-userbot-uploads:/telegram-userbot/backend/var/uploads:cached
      - telegram-userbot-contents:/telegram-userbot/backend/var/contents:cached

  ######################################################################################################################
  # Gateway layer
  ######################################################################################################################

  tusd-init:
    container_name: telegram_userbot_tusd_init
    build:
      context: .
      dockerfile: tusd/Dockerfile
      target: init
    environment:
      UPLOAD_MANAGERS_GID: ${UPLOAD_MANAGERS_GID}
    volumes:
      - telegram-userbot-uploads:/srv/tusd-data/data:cached

  tusd:
    build:
      context: .
      dockerfile: tusd/Dockerfile
      target: prod
      args:
        UPLOAD_MANAGERS_GID: ${UPLOAD_MANAGERS_GID}
    depends_on:
      alloy:
        condition: service_started
      tusd-init:
        condition: service_completed_successfully
    restart: unless-stopped
    volumes:
      - telegram-userbot-uploads:/srv/tusd-data/data:cached

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
      target: prod
    restart: unless-stopped
    volumes:
      - telegram-userbot-assets:/telegram-userbot/backend/public/build:ro
    labels:
      - traefik.enable=true
      - traefik.http.routers.nginx.rule=Host(`${DOMAIN}`)
      - traefik.http.routers.nginx.entrypoints=websecure
      - traefik.http.routers.nginx.tls.certresolver=letsencrypt

  traefik:
    container_name: telegram_userbot_traefik
    image: traefik:v3
    restart: unless-stopped
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.letsencrypt.acme.email=${LETSENCRYPT_EMAIL}
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.letsencrypt.acme.httpchallenge=true
      - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web
    ports:
      - ${HTTP_PORT}:80
      - ${HTTPS_PORT}:443
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt:/letsencrypt
    networks:
      - telegram-userbot-network

  ######################################################################################################################
  # Monitoring layer
  ######################################################################################################################

  loki:
    build:
      context: .
      dockerfile: loki/Dockerfile
      target: prod
    restart: unless-stopped
    volumes:
      - telegram-userbot-loki:/loki

  node-exporter:
    restart: unless-stopped

  cadvisor:
    restart: unless-stopped

  prometheus:
    build:
      context: .
      dockerfile: prometheus/Dockerfile
      target: prod
    restart: unless-stopped
    volumes:
      - telegram-userbot-prometheus:/prometheus

  grafana:
    build:
      context: .
      dockerfile: grafana/Dockerfile
      target: prod
    restart: unless-stopped

volumes:
  telegram-userbot-assets:
  telegram-userbot-uploads:
  telegram-userbot-contents:
  letsencrypt:
